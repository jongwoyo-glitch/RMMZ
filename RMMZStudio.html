<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMMZ Studio</title>
    <link rel="stylesheet" href="RMMZStudio.css">
</head>
<body>
    <script src="_temp_db_load.js"></script>
    <script src="Project1/js/plugins/src/srpgPhaseParser.js"></script>
    <script src="Project1/js/plugins/GahoSystem.js"></script>
    <!-- ===================== SECTION: HTML Structure ===================== -->
    <div id="appRoot">
        <!-- Loading Screen -->
        <div id="loadingScreen" class="loadingScreen">
            <div class="loadingContent">
                <h1>RMMZ Studio</h1>
                <div id="loadModeSelector" style="display:flex;gap:8px;margin-bottom:12px;">
                    <button class="projectPickerBtn" style="flex:1;" onclick="document.getElementById('projectInput').click()">
                        로컬 폴더
                    </button>
                    <button class="projectPickerBtn" id="btnGitHubMode" style="flex:1;background:#24292e;" onclick="var p=document.getElementById('githubLoginPanel');if(p){p.style.display=p.style.display==='block'?'none':'block';if(window.GitHubAdapter&&GitHubAdapter.loadConfig){GitHubAdapter.loadConfig().then(function(c){if(c){if(c.owner&&c.repo)document.getElementById('ghRepo').value=c.owner+'/'+c.repo;if(c.branch)document.getElementById('ghBranch').value=c.branch;if(c.token)document.getElementById('ghToken').value=c.token;}});}}">
                        GitHub
                    </button>
                </div>
                <input type="file" id="projectInput" webkitdirectory>
                <div id="githubLoginPanel" style="display:none;background:#1a1a2e;border:1px solid #444;border-radius:8px;padding:16px;margin-top:8px;text-align:left;">
                    <div style="font-size:0.85em;color:#aaa;margin-bottom:10px;">GitHub 저장소에서 프로젝트를 불러옵니다.</div>
                    <label style="font-size:0.8em;color:#888;">저장소 (owner/repo)</label>
                    <input type="text" id="ghRepo" placeholder="username/my-rmmz-project" style="width:100%;padding:6px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;margin-bottom:8px;box-sizing:border-box;">
                    <label style="font-size:0.8em;color:#888;">브랜치</label>
                    <input type="text" id="ghBranch" value="main" style="width:100%;padding:6px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;margin-bottom:8px;box-sizing:border-box;">
                    <label style="font-size:0.8em;color:#888;">Personal Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;padding:6px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;margin-bottom:8px;box-sizing:border-box;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
                        <input type="checkbox" id="ghRemember" checked>
                        <label for="ghRemember" style="font-size:0.75em;color:#888;">이 브라우저에 기억하기</label>
                    </div>
                    <button onclick="(window.UI||UI)._connectGitHub()" style="width:100%;padding:8px;background:#238636;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer;">연결</button>
                    <div id="ghError" style="color:#f85149;font-size:0.8em;margin-top:8px;display:none;"></div>
                </div>
                <div id="progressBar">
                    <div id="progressFill"></div>
                </div>
                <div id="progressText">대기 중...</div>
            </div>
        </div>

        <!-- Main Editor -->
        <div id="editor">
            <div class="topBar">
                <h2 style="cursor:pointer;" onclick="UI.showProjectInfo()">RMMZ Studio</h2>
                <span id="projectNameBadge" style="background:#0f3460;color:#e94560;font-size:0.7em;padding:2px 8px;border-radius:10px;align-self:center;margin-right:4px;border:1px solid #e94560;cursor:pointer;" onclick="UI.showProjectSwitcher()" title="프로젝트 교체">(프로젝트 없음)</span>
                <button class="modeTab active" onclick="API.switchMode('database')">데이터베이스</button>
                <button class="modeTab" onclick="API.switchMode('map')">맵</button>
                <button class="modeTab" onclick="API.switchMode('event')">이벤트</button>
                <button class="modeTab" onclick="API.switchMode('resources')">리소스</button>
                <button class="modeTab" onclick="API.switchMode('plugins')">플러그인</button>
                <button class="modeTab" onclick="API.switchMode('preview')" style="color:#2ecc71;">프리뷰</button>
                <div style="flex:1"></div>
                <button class="modeTab" style="background:#e67e22;color:#fff;" onclick="UI.showProjectSwitcher()">프로젝트 교체</button>
                <button id="btnSaveProject" class="modeTab" style="background:#2ecc71;color:#fff;" onclick="API.saveToProject()">프로젝트 저장</button>
                <span id="saveStatus" style="color:#aaa;font-size:0.8em;margin-left:8px;align-self:center;"></span>
            </div>

            <div class="mainContent">
                <!-- DATABASE MODE -->
                <div id="modeDatabase" class="mode" style="flex-direction: column;">
                    <!-- DB 상단 카테고리 탭 -->
                    <div class="dbTopBar">
                        <button class="dbTab active" onclick="UI.switchDBTab('actors')">배우</button>
                        <button class="dbTab" onclick="UI.switchDBTab('classes')">직업</button>
                        <button class="dbTab" onclick="UI.switchDBTab('skills')">스킬</button>
                        <button class="dbTab" onclick="UI.switchDBTab('items')">아이템</button>
                        <button class="dbTab" onclick="UI.switchDBTab('weapons')">무기</button>
                        <button class="dbTab" onclick="UI.switchDBTab('armors')">방어구</button>
                        <button class="dbTab" onclick="UI.switchDBTab('enemies')">적</button>
                        <button class="dbTab" onclick="UI.switchDBTab('troops')">전투</button>
                        <button class="dbTab" onclick="UI.switchDBTab('states')">상태</button>
                        <button class="dbTab" onclick="UI.switchDBTab('commonEvents')">공통이벤트</button>
                        <button class="dbTab" onclick="UI.switchDBTab('system')">시스템</button>
                        <button class="dbTab" onclick="UI.switchDBTab('tilesets')">타일셋</button>
                    </div>
                    <!-- DB 하단: 왼쪽 아이템 리스트 + 오른쪽 편집 폼 -->
                    <div style="display:flex; flex:1; overflow:hidden;">
                        <div class="dbListPanel">
                            <input type="text" id="dbSearch" placeholder="검색..." onkeyup="UI.dbSearch()" style="width:100%; box-sizing:border-box; margin-bottom:8px; padding:6px 8px; background:#1a1a2e; border:1px solid #16213e; color:#eee; border-radius:3px;">
                            <ul class="itemList" id="dbList" style="flex:1; overflow-y:auto; margin:0; padding:0;"></ul>
                            <div style="display:flex; gap:5px; margin-top:8px;">
                                <button class="iconBtn" onclick="UI.dbAddItem()" style="flex:1;">+ 추가</button>
                                <button class="iconBtn danger" onclick="UI.dbDeleteItem()" style="width:50px;">삭제</button>
                            </div>
                        </div>
                        <div class="dbResizer" id="dbResizer"></div>
                        <div class="centerPanel" style="overflow-y:auto;position:relative;">
                            <div id="dbFormContainer" class="formPanel"></div>
                            <div class="dbFormResizer" id="dbFormResizer">
                                <div class="dbFormResizerHandle"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MAP MODE -->
                <div id="modeMap" class="mode hidden">
                    <div class="leftPanel">
                        <div class="listHeader">
                            <input type="text" placeholder="맵 검색..." id="mapSearch" onkeyup="UI.mapSearch()">
                            <button onclick="UI._addMap(0)" style="padding:2px 8px;font-size:0.75em;background:#27ae60;color:#fff;border:none;border-radius:3px;cursor:pointer;margin-top:4px;width:100%;" title="새 맵 추가">+ 맵 추가</button>
                        </div>
                        <div id="mapList" style="font-size: 0.9em;overflow-y:auto;"></div>
                    </div>
                    <div class="centerPanel">
                        <div class="canvasControls">
                            <div class="layerBtnGroup">
                                <button class="layerBtn active" onclick="UI.mapSetLayer(0)" id="layerBtn0" title="레이어 1">1</button>
                                <button class="layerBtn" onclick="UI.mapSetLayer(1)" id="layerBtn1" title="레이어 2">2</button>
                                <button class="layerBtn" onclick="UI.mapSetLayer(2)" id="layerBtn2" title="레이어 3">3</button>
                                <button class="layerBtn" onclick="UI.mapSetLayer(3)" id="layerBtn3" title="레이어 4">4</button>
                            </div>
                            <span class="controlSep">|</span>
                            <button class="modeBtn" onclick="UI.mapSetEditMode('event')" id="modeBtnEvent" title="이벤트 모드">이벤트</button>
                            <button class="modeBtn" onclick="UI.mapSetEditMode('shadow')" id="modeBtnShadow" title="그림자 모드">그림자</button>
                            <button class="modeBtn" onclick="UI.mapSetEditMode('passage')" id="modeBtnPassage" title="통행 표시">통행</button>
                            <button class="modeBtn" onclick="UI.mapSetEditMode('region')" id="modeBtnRegion" title="지역 ID 편집">지역</button>
                            <span class="controlSep">|</span>
                            <button onclick="UI.mapTool('pencil')" class="mapToolBtn active" id="toolPencil">연필</button>
                            <button onclick="UI.mapTool('rect')" class="mapToolBtn" id="toolRect">사각형</button>
                            <button onclick="UI.mapTool('fill')" class="mapToolBtn" id="toolFill">채우기</button>
                            <button onclick="UI.mapTool('eraser')" class="mapToolBtn" id="toolEraser">지우개</button>
                            <span class="controlSep">|</span>
                            <button id="btnGrid" onclick="UI.mapToggleGrid()">격자</button>
                            <button onclick="UI.mapZoom(0.5)">50%</button>
                            <button onclick="UI.mapZoom(1)">100%</button>
                            <button onclick="UI.mapZoom(2)">200%</button>
                            <span id="zoomIndicator" style="color:#aaa;font-size:0.8em;min-width:40px;text-align:center;">100%</span>
                            <button onclick="UI._undo()" title="실행취소 (Ctrl+Z)">↩</button>
                            <button onclick="UI._redo()" title="다시실행 (Ctrl+Y)">↪</button>
                            <button onclick="UI.mapShowProperties()">맵 속성</button>
                            <span class="controlSep">|</span>
                            <button id="btnSrpgPanel" onclick="UI.mapToggleSrpgPanel()" style="background:#8e44ad;color:#fff;border:1px solid #9b59b6;border-radius:4px;padding:2px 8px;font-weight:bold;cursor:pointer;" title="SRPG 유닛 배치 및 전투 설정">SRPG</button>
                        </div>
                        <div id="mapCanvasWrap">
                            <canvas id="mapCanvas"></canvas>
                            <canvas id="mapGridOverlay"></canvas>
                        </div>
                    </div>
                    <div class="rightPanel">
                        <div id="tilePaletteContainer">
                        <h3 style="color: #e94560; margin-bottom: 6px;">타일 팔레트</h3>
                        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px;">
                            <button class="tileSheetTab active" onclick="UI.mapChangeTileset('A1')" style="padding:2px 6px;font-size:0.75em;background:#2563a0;color:#fff;border:none;border-radius:3px;cursor:pointer;">A1</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('A2')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">A2</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('A3')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">A3</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('A4')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">A4</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('A5')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">A5</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('B')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">B</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('C')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">C</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('D')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">D</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('E')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">E</button>
                            <button class="tileSheetTab" onclick="UI.mapChangeTileset('R')" style="padding:2px 6px;font-size:0.75em;background:#333;color:#ccc;border:none;border-radius:3px;cursor:pointer;">R</button>
                        </div>
                        <div id="tilePalette" style="overflow-y:auto;max-height:calc(100vh - 180px);"></div>
                        </div>
                        <div id="srpgPanelContainer" style="display:none;overflow-y:auto;max-height:calc(100vh - 120px);"></div>
                    </div>
                </div>

                <!-- EVENT MODE -->
                <div id="modeEvent" class="mode hidden">
                    <div class="leftPanel">
                        <div style="margin-bottom: 10px;">
                            <button class="iconBtn" onclick="UI.eventAddCommand()" style="width: 100%; margin-bottom: 5px;">+ 명령 추가</button>
                            <button class="iconBtn danger" onclick="UI.eventDeleteCommand()" style="width: 100%;">명령 삭제</button>
                        </div>
                        <ul class="itemList" id="eventCommandList"></ul>
                    </div>
                    <div class="centerPanel">
                        <div id="eventFormContainer" class="formPanel"></div>
                    </div>
                    <div class="rightPanel">
                        <h3 style="color: #e94560; margin-bottom: 10px;">미리보기</h3>
                        <div class="messagePreview" id="eventPreview">
                            <div style="text-align: center; color: #aaa;">미리보기</div>
                        </div>
                        <div style="display: flex; gap: 5px; margin-top: 10px;">
                            <button class="iconBtn" onclick="UI.eventPreviewPrev()" style="flex: 1;">←</button>
                            <button class="iconBtn" onclick="UI.eventPreviewReset()" style="flex: 1;">초기화</button>
                            <button class="iconBtn" onclick="UI.eventPreviewNext()" style="flex: 1;">→</button>
                        </div>
                        <button class="iconBtn" onclick="UI.eventExportJSON()" style="width: 100%; margin-top: 10px;">JSON 내보내기</button>
                    </div>
                </div>

                <!-- RESOURCES MODE -->
                <div id="modeResources" class="mode hidden" style="flex-direction:column;">
                    <div style="display:flex; flex:1; overflow:hidden;">
                        <div class="leftPanel" style="width:180px; min-width:180px;">
                            <div class="listHeader">
                                <input type="text" placeholder="검색..." id="resSearch" onkeyup="UI.resSearch()">
                            </div>
                            <div id="resourcesTree" style="font-size: 0.9em;"></div>
                        </div>
                        <div class="centerPanel" style="display:flex; flex-direction:column; overflow:hidden;">
                            <div id="resHeader" style="padding:0 0 10px; color:#aaa; font-size:0.85em; flex-shrink:0;"></div>
                            <div id="resourcesContent" class="grid" style="overflow-y:auto; flex:1;"></div>
                        </div>
                        <div id="resPreviewPanel" class="rightPanel" style="display:none; width:280px; text-align:center;">
                            <div id="resPreviewContent" style="padding:10px;"></div>
                        </div>
                    </div>
                </div>

                <!-- PLUGINS MODE -->
                <div id="modePlugins" class="mode hidden">
                    <div class="leftPanel">
                        <div class="listHeader">
                            <button class="iconBtn" onclick="UI.pluginAdd()" style="flex: 1;">+ 추가</button>
                            <button class="iconBtn danger" onclick="UI.pluginRemove()" style="width: 50px;">삭제</button>
                        </div>
                        <div style="margin-bottom:8px;">
                            <button class="iconBtn" onclick="UI.pluginScanFolder()" style="width:100%; background:#0f3460; border:1px solid #16213e; font-size:0.8em;">폴더 스캔</button>
                        </div>
                        <div id="pluginsList"></div>
                    </div>
                    <div class="centerPanel">
                        <div id="pluginFormContainer" class="formPanel"></div>
                    </div>
                </div>

                <!-- PREVIEW MODE -->
                <div id="modePreview" class="mode hidden">
                    <div class="centerPanel">
                        <div id="previewControls">
                            <button class="iconBtn" onclick="UI.previewPlay('full')" style="background:#e94560;color:#fff;" title="타이틀 화면부터 전체 게임 실행">전체 실행</button>
                            <span style="color:#555;margin:0 2px;">|</span>
                            <select id="previewMapSelect"><option value="">맵 선택...</option></select>
                            <label style="color:#aaa;font-size:0.8em;">X:<input id="previewStartX" type="number" value="8" min="0" style="width:50px;padding:2px 4px;background:#1a1a2e;border:1px solid #16213e;color:#e0e0e0;border-radius:3px;font-size:0.85em;"></label>
                            <label style="color:#aaa;font-size:0.8em;">Y:<input id="previewStartY" type="number" value="6" min="0" style="width:50px;padding:2px 4px;background:#1a1a2e;border:1px solid #16213e;color:#e0e0e0;border-radius:3px;font-size:0.85em;"></label>
                            <button class="iconBtn" onclick="UI.previewPlay('map')" style="background:#2ecc71;color:#fff;" title="선택한 맵에서 바로 시작">맵 실행</button>
                            <button class="iconBtn" onclick="UI.previewToggleMsgPanel()">메시지 테스트</button>
                            <button id="previewAudioToggle" class="iconBtn" onclick="UI.previewToggleAudio()" style="background:#555;color:#ccc;">오디오 OFF</button>
                            <button class="iconBtn danger" onclick="UI.previewStop()">중지</button>
                            <span id="previewStatus">대기 중</span>
                        </div>
                        <div id="previewMsgPanel">
                            <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
                                <select id="previewMsgFace" style="padding:4px;background:#1a1a2e;border:1px solid #16213e;color:#e0e0e0;border-radius:3px;font-size:0.8em;width:120px;">
                                    <option value="">얼굴 없음</option>
                                </select>
                                <select id="previewMsgFaceIdx" style="padding:4px;background:#1a1a2e;border:1px solid #16213e;color:#e0e0e0;border-radius:3px;font-size:0.8em;width:50px;">
                                    <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                    <option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option>
                                </select>
                            </div>
                            <div style="display:flex;gap:6px;">
                                <input id="previewMsgText" placeholder="표시할 메시지..." onkeydown="if(event.key==='Enter')UI.previewSendMessage()">
                                <button class="iconBtn" onclick="UI.previewSendMessage()" style="width:60px;">전송</button>
                            </div>
                        </div>
                        <iframe id="previewIframe" style="margin-top:36px;height:calc(100% - 36px);"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="faceModal" class="modal">
        <div class="modalContent">
            <div class="modalHeader">
                얼굴 선택
                <button class="closeBtn" onclick="document.getElementById('faceModal').classList.remove('active')">×</button>
            </div>
            <div id="faceGrid" class="grid"></div>
        </div>
    </div>

    <div id="mapPropertiesModal" class="modal">
        <div class="modalContent">
            <div class="modalHeader">
                맵 속성
                <button class="closeBtn" onclick="UI.closeMapPropertiesModal()">×</button>
            </div>
            <div id="mapPropertiesForm"></div>
            <button class="iconBtn" onclick="UI.saveMapProperties()" style="width: 100%; margin-top: 15px;">저장</button>
        </div>
    </div>

    <div id="eventCommandModal" class="modal">
        <div class="modalContent">
            <div class="modalHeader">
                명령 추가
                <button class="closeBtn" onclick="UI.closeEventModal()">×</button>
            </div>
            <div id="eventModalContent"></div>
        </div>
    </div>

    <!-- Picker Modal (Animation / Audio) -->
    <div id="pickerModal" class="modal">
        <div class="modalContent" style="min-width:640px; max-width:800px; max-height:85vh; display:flex; flex-direction:column;">
            <div class="modalHeader">
                <span id="pickerTitle">선택</span>
                <button class="closeBtn" onclick="UI.closePicker()">×</button>
            </div>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="pickerSearch" placeholder="검색..." style="flex:1;" oninput="UI._pickerFilter()">
                <span id="pickerCount" style="color:#888; font-size:0.85em; align-self:center;"></span>
            </div>
            <!-- Audio player (shown for audio pickers) -->
            <div id="pickerPlayer" style="display:none; margin-bottom:10px;">
                <audio id="pickerAudio" controls style="width:100%; height:32px;"></audio>
            </div>
            <!-- Animation Effekseer preview -->
            <div id="pickerAnimPreview" style="display:none; margin-bottom:10px; text-align:center; position:relative;">
                <canvas id="pickerEffCanvas" width="320" height="240" style="background:#000; border:1px solid #1a2a3a; border-radius:4px;"></canvas>
                <div style="margin-top:4px; display:flex; gap:6px; justify-content:center; align-items:center;">
                    <button type="button" class="iconBtn" id="pickerAnimPlay" style="padding:2px 12px; font-size:0.8em;" title="재생">▶ 재생</button>
                    <span id="pickerAnimName" style="color:#888; font-size:0.8em;"></span>
                </div>
            </div>
            <div id="pickerList" style="flex:1; overflow-y:auto; max-height:55vh;"></div>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="iconBtn" onclick="UI._pickerConfirm()" style="flex:1; background:#e94560;">확인</button>
                <button class="iconBtn" onclick="UI.closePicker()" style="flex:1;">취소</button>
            </div>
        </div>
    </div>

    <!-- Trait Editor Modal (RMMZ-style) -->
    <div id="traitModal" class="modal traitModal">
        <div class="modalContent">
            <div class="traitModalHeader">
                <span>특성</span>
                <button class="closeBtn" onclick="UI.closeTraitModal()">×</button>
            </div>
            <div class="traitTabs" id="traitModalTabs"></div>
            <div class="traitTabBody" id="traitModalBody"></div>
            <div class="traitModalFooter">
                <button class="btnOk" onclick="UI.saveTraitModal()">OK</button>
                <button class="btnCancel" onclick="UI.closeTraitModal()">취소</button>
            </div>
        </div>
    </div>

    <!-- Project Switcher Modal -->
