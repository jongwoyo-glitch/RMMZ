<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>가호록 v11</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --wood:#4a7c59;--fire:#c44536;--earth:#b5893a;--metal:#7a8b99;--water:#3a7bd5;
  --bg:#0c0e14;--bg2:#12151e;--card:#161a24;
  --bdr:#222738;--bdr2:#2e3448;
  --txt:#e8e4d9;--dim:#8a8778;--fnt:#444;
  --gold:#d4a843;--gdim:rgba(212,168,67,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.ct{max-width:420px;margin:0 auto;padding:0 12px 60px;}
.hdr{text-align:center;padding:24px 0 16px;}
.hdr-t{font-family:'Noto Serif KR',serif;font-weight:900;font-size:11px;letter-spacing:6px;color:var(--gold);opacity:.5;}
.hdr-n{font-family:'Noto Serif KR',serif;font-weight:700;font-size:24px;margin-top:5px;}
.hdr-i{font-size:11px;color:var(--dim);margin-top:4px;}
.hdr-s{font-size:9px;color:var(--dim);margin-top:2px;opacity:.6;}
.name-labels{font-size:8px;color:var(--fnt);margin-top:2px;letter-spacing:1px;}
.name-labels span{margin:0 4px;}
.badge{display:inline-block;font-size:8px;padding:2px 7px;border-radius:3px;background:var(--gdim);color:var(--gold);font-weight:700;margin-top:3px;}
.synopsis{font-size:10px;color:var(--dim);line-height:1.7;padding:10px 12px;margin:6px 0 0;border-left:2px solid var(--bdr2);text-align:left;animation:fadeIn .6s ease both;}
.syn-hl{color:var(--txt);font-weight:600;}
.syn-el{font-weight:600;}
.syn-h{color:#c47a9e;}
.tog{display:flex;margin:14px 0 4px;background:var(--bg2);border-radius:7px;padding:2px;border:1px solid var(--bdr);}
.tog-b{flex:1;text-align:center;padding:6px 0;font-size:10px;font-weight:500;color:var(--dim);border-radius:5px;cursor:pointer;}
.tog-b.on{background:var(--card);color:var(--txt);box-shadow:0 1px 6px rgba(0,0,0,.3);}
.tabs{display:flex;margin:14px 0 0;border-bottom:1px solid var(--bdr);}
.tab{flex:1;text-align:center;padding:8px 0;font-size:11px;font-weight:500;color:var(--dim);cursor:pointer;position:relative;}
.tab.on{color:var(--gold);}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:22%;right:22%;height:2px;background:var(--gold);border-radius:1px;}
.tc{display:none;}.tc.on{display:block;}
.stit{font-family:'Noto Serif KR',serif;font-size:12px;color:var(--gold);text-align:center;letter-spacing:3px;margin:18px 0 4px;}
.ssub{font-size:9px;color:var(--dim);text-align:center;margin-bottom:12px;}
.col-heads{display:grid;grid-template-columns:repeat(4,1fr);margin-bottom:3px;}
.col-h{text-align:center;font-size:10px;color:var(--dim);font-weight:500;letter-spacing:1px;}

.saju-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:14px;overflow:hidden;border:2px solid var(--bdr2);background:var(--card);margin-bottom:10px;}
.saju-table tr:first-child td{border-bottom:1px solid var(--bdr);}
.saju-table td{width:25%;padding:4px;vertical-align:middle;position:relative;}
.row-label{position:absolute;top:3px;left:4px;font-size:6px;letter-spacing:1px;color:var(--fnt);font-weight:500;z-index:2;}

/* ===== FRAME ===== */
.frame{
  position:relative;border-radius:10px;
  border:2px solid var(--bdr);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .45s cubic-bezier(.22,1,.36,1);overflow:hidden;
  /* ALL frames same size */
  margin:2px;
  padding:14px 4px;
}
.fr-emoji{font-size:24px;line-height:1;transition:all .45s;filter:saturate(.25) brightness(.55);}
.fr-name{font-family:'Noto Serif KR',serif;font-size:11px;font-weight:700;margin-top:3px;color:var(--dim);transition:all .45s;text-align:center;line-height:1.2;}
.fr-sub{font-size:7px;color:#fff;-webkit-text-stroke:.5px var(--el-dark);paint-order:stroke fill;margin-top:1px;transition:all .45s;}

/* 양: faint radial default + text styling */
.frame.yang{background:radial-gradient(circle at center, var(--el-soft) 0%, transparent 55%),var(--bg2);}
.frame.yang .fr-name{color:#fff;-webkit-text-stroke:1px var(--el-dark);paint-order:stroke fill;}
.frame.yang .fr-emoji{filter:saturate(.35) brightness(.6) drop-shadow(0 0 2px var(--el-soft));}
/* 음: ring pushed to edges, dimmed to match yang */
.frame.yin{background:radial-gradient(circle at center, transparent 65%, var(--el-soft) 95%),var(--bg2);}
.frame.yin .fr-name{color:#fff;-webkit-text-stroke:1px var(--el-dark);paint-order:stroke fill;}
.frame.yin .fr-emoji{filter:saturate(.3) brightness(.55);}

/* ===== ACT: strong gradients + full saturation ===== */
.frame.act{
  box-shadow:0 0 12px var(--el-glow);
}
.frame.act .fr-emoji{filter:saturate(1.1) brightness(1.05);}
/* act 양: center→corners X강하게 */
.frame.act.yang{background:
  linear-gradient(135deg, transparent 10%, var(--el-hot) 50%, transparent 90%),
  linear-gradient(45deg, transparent 10%, var(--el-hot) 50%, transparent 90%),
  var(--bg2);}
.frame.act.yang .fr-emoji{filter:saturate(1.2) brightness(1.1) drop-shadow(0 0 10px var(--el-hot));}
.frame.act.yang .fr-name{-webkit-text-stroke:1.2px var(--el-dark);}
/* act 음: corners→center 강하게 */
.frame.act.yin{background:
  linear-gradient(135deg, var(--el-hot) 0%, transparent 45%),
  linear-gradient(225deg, var(--el-hot) 0%, transparent 45%),
  linear-gradient(315deg, var(--el-hot) 0%, transparent 45%),
  linear-gradient(45deg, var(--el-hot) 0%, transparent 45%),
  var(--bg2);}
.frame.act.yin .fr-emoji{filter:saturate(1.1) brightness(1);}

/* ===== MID: soft gradients ===== */
.frame.mid{
  box-shadow:0 0 6px var(--el-glow);
}
.frame.mid .fr-emoji{filter:saturate(.65) brightness(.8);}
/* mid 양: 원형 from center, 은은 */
.frame.mid.yang{background:radial-gradient(circle at center, var(--el-soft) 0%, transparent 65%),var(--bg2);}
.frame.mid.yang .fr-emoji{filter:saturate(.7) brightness(.85) drop-shadow(0 0 3px var(--el-soft));}
/* mid 음: 테두리에 가까운 링, 양과 유사 밝기 */
.frame.mid.yin{background:radial-gradient(circle at center, transparent 60%, var(--el-soft) 90%),var(--bg2);}
.frame.mid.yin .fr-emoji{filter:saturate(.6) brightness(.8);}


/* ===== LOCKED ===== */
.frame.locked{border:1.5px dashed var(--fnt);background:var(--bg2)!important;margin:8px;padding:10px 4px;}
.frame.locked .fr-emoji{font-size:16px;filter:blur(3px) saturate(0)!important;}
.frame.locked .fr-name{filter:blur(3px);color:var(--fnt)!important;-webkit-text-stroke:0!important;}
.frame.locked .fr-sub{visibility:hidden;}
.fr-lock{position:absolute;font-size:14px;opacity:.2;}

/* Support */
.sup{margin:0 0 12px;padding:9px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;}
.sup-chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;}
.sup-link{font-size:11px;font-weight:500;}
.sup-desc{width:100%;text-align:center;font-size:9px;color:var(--dim);margin-top:3px;line-height:1.4;}
.pm-g{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px;}
.pm-c{text-align:center;padding:3px;}.pm-l{font-size:9px;color:var(--gold);font-weight:500;}.pm-d{font-size:7px;color:var(--dim);margin-top:1px;line-height:1.3;}
.div{height:1px;background:linear-gradient(90deg,transparent,var(--bdr),transparent);margin:2px 0 16px;}
.el-ch{display:flex;justify-content:space-between;align-items:flex-end;height:120px;padding:0 6px;margin-bottom:6px;}
.el-w{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;}
.el-bar{width:24px;border-radius:4px 4px 2px 2px;position:relative;min-height:3px;}
.el-v{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;}
.el-l{margin-top:5px;font-size:9px;font-weight:500;}
.bw{background:linear-gradient(180deg,var(--wood),#2d4d35);}.bf{background:linear-gradient(180deg,var(--fire),#6d2219);}.be{background:linear-gradient(180deg,var(--earth),#6d511e);}.bm{background:linear-gradient(180deg,var(--metal),#3d464d);}.ba{background:linear-gradient(180deg,#3a7bd5,#1a3a6a);}
.st-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:18px;}
.st-c{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:9px;}
.st-l{font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:3px;}
.st-v{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;}
.st-bg{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:5px;overflow:hidden;}
.st-f{height:100%;border-radius:1px;}
.cpt{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-top:18px;}
.cpt-t{font-size:10px;font-weight:700;margin-bottom:8px;}
.cpt-r{display:flex;align-items:center;gap:7px;padding:6px 0;}.cpt-r+.cpt-r{border-top:1px solid rgba(255,255,255,.04);}
.cpt-i{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.cpt-i.p{background:rgba(92,184,122,.12);color:#5cb87a;}.cpt-i.n{background:rgba(196,69,54,.12);color:#c44536;}
.cpt-x{font-size:10px;color:var(--dim);line-height:1.3;}.cpt-x strong{color:var(--txt);font-weight:500;}
/* ===== PERSONALITY PARAMS ===== */
.prm-hdr{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;}
.prm-hdr .stit{margin:0;}
.prm-info-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg2);color:var(--dim);font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.prm-info-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gdim);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s ease;}
.modal-box{background:var(--card);border:1px solid var(--bdr2);border-radius:14px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto;padding:18px 14px;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-size:18px;color:var(--dim);cursor:pointer;background:none;border:none;line-height:1;}
.modal-close:hover{color:var(--txt);}
.modal-title{font-family:'Noto Serif KR',serif;font-size:13px;color:var(--gold);text-align:center;letter-spacing:3px;margin-bottom:4px;}
.modal-sub{font-size:9px;color:var(--dim);text-align:center;margin-bottom:14px;}
.penta-wrap{display:flex;justify-content:center;margin-bottom:10px;}
.modal-legend{display:flex;gap:12px;justify-content:center;margin-bottom:10px;}
.modal-leg-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--dim);}
.modal-leg-line{width:16px;height:2px;border-radius:1px;}
.modal-tbl{width:100%;border-collapse:collapse;margin-top:8px;}
.modal-tbl th{font-size:8px;color:var(--dim);font-weight:500;padding:4px 3px;border-bottom:1px solid var(--bdr);text-align:left;}
.modal-tbl td{font-size:9px;padding:4px 3px;border-bottom:1px solid rgba(255,255,255,.03);}
.modal-tbl .ss-name{font-weight:700;color:var(--gold);}
.modal-tbl .ss-ax{color:var(--txt);}
.modal-tbl .ss-ex{color:var(--dim);font-size:8px;}
.prm-sec{animation:fadeIn .5s ease both;}
.prm-group{background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:10px;padding:10px 8px 4px;margin-top:10px;}
.prm-group-title{font-family:'Noto Serif KR',serif;font-size:10px;color:var(--gold);text-align:center;letter-spacing:3px;margin-bottom:2px;opacity:.7;}
.prm-group-sub{font-size:7px;color:var(--dim);text-align:center;margin-bottom:8px;}
.prm-row-wrap{display:flex;align-items:flex-start;gap:6px;margin-bottom:2px;}
.prm-row-bar{flex:0 0 52%;}
.prm-row{display:flex;align-items:center;gap:0;}
.prm-lbl{width:26px;font-size:6px;font-weight:700;letter-spacing:.3px;line-height:1.2;flex-shrink:0;}
.prm-lbl.l{text-align:right;padding-right:3px;color:var(--fire);}
.prm-lbl.r{text-align:left;padding-left:3px;color:var(--water);}
.prm-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;position:relative;border:1px solid var(--bdr);overflow:visible;}
.prm-mid{position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:var(--bdr2);z-index:1;}
.prm-fill{position:absolute;top:1px;bottom:1px;border-radius:3px;transition:all .6s cubic-bezier(.22,1,.36,1);}
.prm-fill.over{background:linear-gradient(90deg,transparent,var(--fire));right:50%;border-radius:3px 0 0 3px;}
.prm-fill.under{background:linear-gradient(90deg,var(--water),transparent);left:50%;border-radius:0 3px 3px 0;}
.prm-dot{position:absolute;top:50%;width:5px;height:5px;border-radius:50%;background:var(--gold);border:1px solid var(--bg);transform:translate(-50%,-50%);z-index:3;box-shadow:0 0 4px rgba(212,168,67,.4);transition:left .6s cubic-bezier(.22,1,.36,1);}
.prm-row-info{flex:1;padding-top:0px;min-width:0;}
.prm-title{font-size:8px;font-weight:600;letter-spacing:.3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.prm-axis{font-size:6px;color:var(--dim);letter-spacing:.5px;line-height:1.2;}
.prm-subs{display:flex;gap:4px;margin:1px 26px 4px 26px;justify-content:center;}
.prm-sub{font-size:6px;letter-spacing:.3px;opacity:.7;}
.prm-sub.over-sub{color:var(--fire);}
.prm-sub.under-sub{color:var(--water);}
.prm-tag-wrap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:8px;}
.prm-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gdim);color:var(--gold);letter-spacing:.5px;}
.prm-arche-wrap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:6px;}
.prm-arche{font-size:8px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:.5px;border:1px solid rgba(212,168,67,.25);background:rgba(212,168,67,.06);color:#d4c090;}
.prm-note{font-size:8px;color:var(--dim);text-align:center;margin-top:6px;line-height:1.4;}
/* ===== SINSAL TAGS ===== */
.ss-sec-hdr{margin-top:14px;}
#sinsal-sec{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:6px;min-height:20px;animation:fadeIn .5s ease both;}
.ss-tag{font-size:9px;font-weight:600;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--dim);border:1px solid var(--bdr);letter-spacing:.5px;transition:all .3s;}
.ss-tag.ss-strong{background:rgba(212,168,67,.08);color:var(--gold);border-color:rgba(212,168,67,.3);}
.ss-tag.ss-extreme{background:rgba(196,69,54,.1);color:#e8a090;border-color:rgba(196,69,54,.35);box-shadow:0 0 8px rgba(196,69,54,.15);}
.ss-star{font-size:7px;margin-left:2px;opacity:.7;}
.ss-tag.ss-strong .ss-star{color:var(--gold);opacity:1;}
.ss-tag.ss-extreme .ss-star{color:#c44536;opacity:1;}
.ss-empty{font-size:8px;color:var(--dim);text-align:center;padding:8px 0;}
/* ===== DESIGN MODAL ===== */
.dm-section{margin-bottom:14px;}
.dm-label{font-size:9px;color:var(--dim);margin-bottom:6px;letter-spacing:1px;}
.dm-el-row{display:flex;gap:6px;justify-content:center;}
.dm-el-btn{width:44px;height:44px;border-radius:10px;border:2px solid var(--bdr);background:var(--bg2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-direction:column;}
.dm-el-btn span{font-size:7px;margin-top:1px;}
.dm-el-btn.on{border-color:var(--gold);background:var(--gdim);box-shadow:0 0 10px rgba(212,168,67,.15);}
.dm-gdr-row{display:flex;gap:8px;justify-content:center;margin-top:4px;}
.dm-gdr-btn{padding:6px 18px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg2);color:var(--dim);font-size:11px;cursor:pointer;transition:all .2s;}
.dm-gdr-btn.on{border-color:var(--gold);color:var(--gold);background:var(--gdim);}
.dm-slider-row{margin-bottom:14px;}
.dm-slider-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.dm-slider-hdr .dm-ax{font-size:10px;font-weight:700;color:var(--txt);}
.dm-slider-hdr .dm-ax-sub{font-size:7px;color:var(--dim);}
.dm-bar-wrap{display:flex;align-items:center;gap:6px;}
.dm-bar-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg2);color:var(--dim);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;transition:all .1s;}
.dm-bar-btn:active{background:var(--gdim);color:var(--gold);border-color:var(--gold);}
.dm-bar-track{flex:1;height:14px;background:var(--bg2);border-radius:7px;position:relative;border:1px solid var(--bdr);overflow:hidden;}
.dm-bar-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--bdr2);z-index:2;}
.dm-bar-fill-over{position:absolute;top:2px;bottom:2px;right:50%;border-radius:5px 0 0 5px;background:linear-gradient(90deg,transparent,var(--fire));transition:width .2s;}
.dm-bar-fill-under{position:absolute;top:2px;bottom:2px;left:50%;border-radius:0 5px 5px 0;background:linear-gradient(90deg,var(--water),transparent);transition:width .2s;}
.dm-bar-labels{display:flex;justify-content:space-between;margin-top:1px;}
.dm-bar-labels span{font-size:7px;color:var(--dim);}
.dm-slider-row input[type=range]{display:none;}
.dm-total{text-align:center;font-size:9px;color:var(--dim);margin-bottom:10px;}
.dm-total b{color:var(--gold);}
.dm-preset-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.dm-preset{font-size:8px;padding:4px 10px;border-radius:5px;border:1px solid var(--bdr);background:var(--bg2);color:var(--dim);cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.dm-preset:hover,.dm-preset.on{border-color:var(--gold);color:var(--gold);background:var(--gdim);}
.dm-gen-btn{display:block;width:100%;padding:10px;margin-top:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#d4a843,#b08930);color:#0c0e14;font-size:12px;font-weight:700;font-family:'Noto Serif KR',serif;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.dm-gen-btn:hover{box-shadow:0 0 16px rgba(212,168,67,.3);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.saju-table,.sup,.el-ch,.st-g,.cpt,.prm-sec{animation:fadeIn .5s ease both;}
</style>
</head>
<body>
<div class="ct">
  <div class="tog"><div class="tog-b" onclick="setMode('player')" id="mp">플레이어</div><div class="tog-b on" onclick="setMode('npc')" id="mn">NPC</div><div class="tog-b" onclick="randomNpc()" id="mr">🎲</div><div class="tog-b" onclick="showDesignModal()" id="md">🔧 설계</div></div>
  <div class="hdr"><div class="hdr-t">가 호 록</div><div class="hdr-n" id="cn"></div><div class="hdr-i" id="ci"></div><div class="hdr-s" id="cs"></div><div class="badge" id="cb"></div><div class="badge" id="cr" style="display:none;background:rgba(74,124,89,.15);color:#8a8778;margin-left:4px;"></div></div>
  <div class="synopsis" id="synopsis"></div>
  <div class="tabs"><div class="tab on" onclick="stab('gaho',this)">가호</div><div class="tab" onclick="stab('stat',this)">전투</div><div class="tab" onclick="stab('compat',this)">궁합</div><div class="tab" onclick="stab('appear',this)">외형</div></div>

function getAppearArchetype(d){
  if(!d.race||d.race==='human'){
    const yearGanE=d.p&&d.p[3]&&d.p[3].g&&!d.p[3].g.lk?d.p[3].g.e:null;
    const ethId=yearGanE?ELEM_TO_ETHNO[yearGanE]:'helia';
    return{type:'ethno',id:ethId,data:ETHNO[ethId]};
  }
  return{type:'race',id:d.race,data:RACE_APPEAR[d.race]||RACE_APPEAR.elf};
}

function generateSynopsis(d){
  const sec=document.getElementById('synopsis');
  if(!sec)return;
  const pr=calcParams(d);
  if(!pr||pr.total===0){sec.innerHTML='';return;}
  const {counts,total}=pr;
  const b=total/5;
  const el=d.el||{};
  const gdr=d.gender||'m';
  const dayEl=d.p[1].g.e;
  const dayGan=d.p[1].g;
  const sentences=[];
  
  // === 1. Identity + 십성 (connected) ===
  const gIcon=gdr==='m'?'남성':'여성';
  const idPart=`<span class="syn-el" style="color:${EC[dayEl]}">${dayGan.n}</span>자리의 ${d.race?getAppearArchetype(d).data.name+' ':''} ${gIcon}`;
  const sipTraits=[];
  const axP={bigup:['고집이 세고 독립적인','순종적이고 협조적인'],
    express:['외향적이고 표현이 풍부한','내성적이고 과묵한'],
    percept:['현실 감각이 뛰어난','이상주의적이고 꿈이 많은'],
    discip:['자기 규율이 철저한','자유분방한'],
    reflect:['신중하고 계획적인','즉흥적이고 본능에 충실한']};
  Object.keys(axP).forEach(k=>{
    const v=counts[k];
    if(v>=3) sipTraits.push(axP[k][0]);
    else if(v===0) sipTraits.push(axP[k][1]);
  });
  if(sipTraits.length>0){
    const conn=['이며 ','데다 ',' 동시에 '];
    if(sipTraits.length===1){
      sentences.push(`${idPart}으로, <span class="syn-hl">${sipTraits[0]}</span> 성격이다.`);
    } else if(sipTraits.length===2){
      sentences.push(`${idPart}으로, <span class="syn-hl">${sipTraits[0]}</span>이며 <span class="syn-hl">${sipTraits[1]}</span> 성격이다.`);
    } else {
      const last=sipTraits.pop();
      sentences.push(`${idPart}으로, <span class="syn-hl">${sipTraits.join('</span>고 <span class="syn-hl">')}</span> 데다 <span class="syn-hl">${last}</span> 성격이다.`);
    }
  } else {
    sentences.push(`${idPart}. 뚜렷한 극단이 없는 균형 잡힌 인물이다.`);
  }
  
  // === 2. 오행 nature + deficiency (connected) ===
  const elArr=Object.entries(el).sort((a,b)=>b[1]-a[1]);
  const topEl=elArr[0];const botEl=elArr[elArr.length-1];
  const elT={wood:'자비롭고 성장을 추구하는',fire:'열정적이고 카리스마가 넘치는',earth:'안정적이고 신뢰감 있는',metal:'냉철하고 결단력 있는',water:'지혜롭고 적응력이 뛰어난'};
  const elL={wood:'공감 능력이 부족한',fire:'열정이 부족한',earth:'정서적으로 불안정한',metal:'우유부단한',water:'융통성이 없는'};
  const hasTop=topEl&&topEl[1]>30;const hasBot=botEl&&botEl[1]<5;
  if(hasTop&&hasBot){
    sentences.push(`본성은 <span class="syn-el" style="color:${EC[topEl[0]]}">${elT[topEl[0]]}</span> 편이지만, ${elL[botEl[0]]} 면도 있다.`);
  } else if(hasTop){
    sentences.push(`본성은 <span class="syn-el" style="color:${EC[topEl[0]]}">${elT[topEl[0]]}</span> 편이다.`);
  } else if(hasBot){
    sentences.push(`전반적으로 ${elL[botEl[0]]} 편이다.`);
  }
  
  // === 3. H-traits (connected with 고/며) ===
  const hVals=calcHParams(counts,total,el);
  const hP=[];
  if(hVals.chastity<=1) hP.push('정조관념이 희박하');
  else if(hVals.chastity>=5) hP.push('정조관념이 굳건하');
  if(hVals.morality<=1) hP.push('도덕적 금기를 즐기');
  else if(hVals.morality>=5) hP.push('도덕적 선을 철저히 지키');
  if(hVals.resist<=1) hP.push('쾌락에 극도로 약하');
  else if(hVals.resist>=5) hP.push('쾌락에 쉽게 흔들리지 않');
  if(hVals.submit>=5) hP.push('강한 지배욕을 가지');
  else if(hVals.submit<=1) hP.push('복종에서 쾌감을 느끼');
  if(hVals.sadism>=5) hP.push('타고난 가학 성향이 있');
  else if(hVals.sadism<=1) hP.push('타고난 피학 성향이 있');
  if(hP.length===1) sentences.push(`<span class="syn-h">${hP[0]}는</span> 편이다.`);
  else if(hP.length===2) sentences.push(`<span class="syn-h">${hP[0]}고 ${hP[1]}는</span> 편이다.`);
  else if(hP.length>2){const last=hP.pop();sentences.push(`<span class="syn-h">${hP.join('며, ')}고, ${last}는</span> 편이다.`);}
  
  // === 4. Archetypes ===
  const ARC=[
    {name:'배신자 기질',cond:{bigup:'h',percept:'h',discip:'l'}},{name:'야심가',cond:{bigup:'h',express:'h',percept:'h'}},
    {name:'충성의 칼',cond:{bigup:'l',discip:'h',percept:'l'}},{name:'의리파',cond:{discip:'h',percept:'l'}},
    {name:'타고난 지휘관',cond:{bigup:'h',express:'h',discip:'h'}},{name:'그림자 참모',cond:{bigup:'l',express:'l',percept:'h',reflect:'h'}},
    {name:'사기꾼',cond:{express:'h',percept:'h',discip:'l'}},{name:'은둔 현자',cond:{express:'l',percept:'l',reflect:'h'}},
    {name:'자유영혼',cond:{discip:'l',reflect:'l'}},{name:'고독한 늑대',cond:{bigup:'h',express:'l'}},
    {name:'불꽃 돌진형',cond:{bigup:'h',discip:'l',reflect:'l'}},
  ];
  const matched=[];
  ARC.forEach(a=>{let ok=true;Object.entries(a.cond).forEach(([k,r])=>{if(r==='h'&&counts[k]<3)ok=false;if(r==='l'&&counts[k]>0)ok=false;});if(ok)matched.push(a.name);});
  
  // === 5. Sinsal ===
  const sinDesc={
    '위기의 은인':{1:'위기에 도와줄 누군가가 있다',2:'위기마다 귀인이 나타난다',3:'하늘이 보낸 수호자가 곁에 있다'},
    '책벌레':{1:'책과 친한 편이다',2:'학문에 상당한 재능이 있다',3:'타고난 학자형 인재다'},
    '살벌한 승부사':{1:'승부욕이 있다',2:'승부에 거는 집념이 강하다',3:'이기기 위해 수단을 가리지 않는다'},
    '날카로움':{1:'감이 좋다',2:'칼날 같은 직감이 있다',3:'꿰뚫어보는 눈을 가졌다'},

  };
  const sinsalTags=calcSinsal(d);
  const sinParts=[];
  if(sinsalTags){
    Object.entries(sinsalTags).sort((a,b)=>b[1]-a[1]).slice(0,4).forEach(([n,lv])=>{
      const d2=sinDesc[n];if(d2) sinParts.push(d2[Math.min(lv,3)]);
    });
  }
  
  // === Combine 4+5: archetypes + sinsal ===
  const uniqueSin=[...new Set(sinParts)];
  
  // Korean connective forms
  function stemReplace(s,pairs,ndaSuf,defSuf){
    for(const [from,to] of pairs){
      if(s.endsWith(from)) return s.slice(0,-from.length)+to;
    }
    // Handle ㄴ다 ending verbs: 어울린다→어울리+는데
    if(s.endsWith('다')&&s.length>=2){
      const pc=s.charCodeAt(s.length-2);
      if(pc>=0xAC00&&pc<=0xD7A3){
        const jong=(pc-0xAC00)%28;
        if(jong===4){// ㄴ as jongseong
          return s.slice(0,-2)+String.fromCharCode(pc-4)+ndaSuf;
        }
      }
    }
    if(s.endsWith('다')) return s.slice(0,-1)+defSuf;
    return s;
  }
  const NDE=[['있다','있는데'],['좋다','좋은데'],['강하다','강한데'],['약하다','약한데'],['박하다','박한데'],
    ['뛰어나다','뛰어난데'],['따른다','따르는데'],['빛난다','빛나는데'],
    ['한다','하는데'],['된다','되는데'],['이다','인데']];
  const MYS=[['있다','있으면서'],['좋다','좋으면서'],['강하다','강하면서'],['약하다','약하면서'],['박하다','박하면서'],
    ['뛰어나다','뛰어나면서'],['따른다','따르면서'],['빛난다','빛나면서'],
    ['한다','하면서'],['된다','되면서'],['이다','이면서']];
  const IGO=[['있다','있고'],['좋다','좋고'],['강하다','강하고'],['약하다','약하고'],['박하다','박하고'],
    ['뛰어나다','뛰어나고'],['따른다','따르고'],['빛난다','빛나고'],
    ['한다','하고'],['된다','되고'],['이다','이고']];
  function toNunde(s){return stemReplace(s,NDE,'는데','ㄴ데');}
  function toMyeon(s){return stemReplace(s,MYS,'면서','면서');}
  function toIgo(s){return stemReplace(s,IGO,'고','고');}
  const connFns=[toNunde,toMyeon,toIgo];
  
  function joinSin(arr){
    if(arr.length===0) return '';
    if(arr.length===1) return arr[0]+'.';
    if(arr.length===2) return toNunde(arr[0])+' '+arr[1]+'.';
    if(arr.length===3) return toNunde(arr[0])+' '+arr[1]+'. '+arr[2]+'.';
    // 4개: 2+2, 각 쌍마다 다른 연결어
    return toNunde(arr[0])+' '+arr[1]+'. '+toMyeon(arr[2])+' '+arr[3]+'.';
  }
  
  if(matched.length>0){

  }
  if(uniqueSin.length>0) sentences.push(joinSin(uniqueSin.slice(0,4)));
  
  sec.innerHTML=sentences.join(' ');
}

function buildTable(d){
  const rg=document.getElementById('rg'),rj=document.getElementById('rj');rg.innerHTML='';rj.innerHTML='';
  // detections
  const gjd=d.p.map((p,i)=>(!p.g.lk&&!p.j.lk&&p.g.e&&p.j.e&&p.g.e===p.j.e));
  const pilR=d.p.map((p,i)=>(!p.g.lk&&!p.j.lk)?rel(p.j.e,p.g.e):null);
  const supSame=(!d.p[2].j.lk&&!d.p[1].g.lk&&d.p[2].j.e&&d.p[1].g.e&&d.p[2].j.e===d.p[1].g.e);
  const byoG=new Set(),byoJ=new Set();
  for(let i=0;i<3;i++){
    if(!d.p[i].g.lk&&!d.p[i+1].g.lk&&d.p[i].g.e&&d.p[i+1].g.e&&d.p[i].g.e===d.p[i+1].g.e){byoG.add(i);byoG.add(i+1);}
    if(!d.p[i].j.lk&&!d.p[i+1].j.lk&&d.p[i].j.e&&d.p[i+1].j.e&&d.p[i].j.e===d.p[i+1].j.e){byoJ.add(i);byoJ.add(i+1);}
  }

  d.p.forEach((p,i)=>{
    // === State logic ===
    // act: 간여지동, 병존, 기둥내상생, 월지동류
    // 기본(mid): 나머지 전부

    // GAN state
    let gSt='mid';
    if(p.g.lk) gSt='locked';
    else if(gjd[i]||byoG.has(i)||pilR[i]==='gen'||(i===1&&supSame)) gSt='act';

    const gtd=document.createElement('td');
    const gY=p.g.lk?true:(GAN_YY[p.g.n]!==undefined?GAN_YY[p.g.n]:true);
    const gf=mkF(p.g.n,p.g.e,gY,true,gSt);
    gtd.appendChild(gf);rg.appendChild(gtd);

    // JI state
    let jSt='mid';
    if(p.j.lk) jSt='locked';
    else if(gjd[i]||byoJ.has(i)||(i===2&&supSame)) jSt='act';

    const jtd=document.createElement('td');
    const jY=p.j.lk?true:(JI_YY[p.j.n]!==undefined?JI_YY[p.j.n]:true);
    const jf=mkF(p.j.n,p.j.e,jY,false,jSt);
    jtd.appendChild(jf);rj.appendChild(jtd);
  });
}

function mkF(name,elem,isYang,isGan,state){
  const f=document.createElement('div');f.className='frame';
  if(state==='locked'){f.classList.add('locked');f.innerHTML='<div class="fr-emoji">❓</div><div class="fr-name">???</div><div class="fr-lock">🔒</div>';return f;}
  const c=EC[elem],dk=EDK[elem];
  f.classList.add(isYang?'yang':'yin');
  if(state==='act')f.classList.add('act');
  else if(state==='mid')f.classList.add('mid');

  // Bright variants for consistent gradient visibility across all elements
  const bright={wood:'#6aad7d',fire:'#e8665a',earth:'#daa84e',metal:'#a0b4c2',water:'#5a9de8'};
  const bc=bright[elem]||c;
  f.style.setProperty('--el-color',c);f.style.setProperty('--el-dark',dk);
  f.style.setProperty('--el-soft',h2r(bc,.22));f.style.setProperty('--el-strong',h2r(bc,.4));
  f.style.setProperty('--el-hot',h2r(bc,.55));f.style.setProperty('--el-glow',h2r(bc,.25));
  const bdrA=state==='act'?.55:.2;
  f.style.borderColor=h2r(bc,bdrA);

  const emoji=isGan?(GE[name]||'⭐'):(JE[name]||'🌐');
  const sub=isGan?(GV[name]||EN[elem]):(JD[name]||'기질');
  f.innerHTML=`<div class="fr-emoji">${emoji}</div><div class="fr-name">${isGan?name+'자리':name}</div><div class="fr-sub">${sub}</div>`;
  return f;
}

function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0;}
function dimOf(y,m){return[31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m-1];}
function absDay(y,m,d){
  const y1=y-1;
  let days=y1*365+Math.floor(y1/4)-Math.floor(y1/100)+Math.floor(y1/400);
  const md=[31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31];
  for(let i=0;i<m-1;i++) days+=md[i];
  return days+d;
}

function renderElemPersonality(d){
  const sec=document.getElementById('elem-prm-sec');
  if(!sec) return;
  sec.innerHTML='';
  const el=d.el;
  if(!el) return;
  
  // Average = 20%, map to 0-6 title index
  // 0%→0, 10%→1, 15%→2, 20%→3, 30%→4, 40%→5, 50%+→6
  function toLevel(pct){
    if(pct<=2) return 0;
    if(pct<=8) return 1;
    if(pct<=16) return 2;
    if(pct<=24) return 3;
    if(pct<=34) return 4;
    if(pct<=44) return 5;
    return 6;
  }
  
  ELEM_AXES.forEach(ax=>{
    const pct=el[ax.id]||0;
    const lv=toLevel(pct);
    const balanced=20; // average
    const deviation=pct-balanced;
    
    // Bar position: 50% = center, left = over, right = under
    let barPct=50;
    if(balanced>0){
      barPct=50-((pct-balanced)/Math.max(balanced,1))*35;
      barPct=Math.max(5,Math.min(95,barPct));
    }
    
    let fillHtml='';
    if(barPct<48){
      fillHtml=`<div class="prm-fill over" style="width:${50-barPct}%;background:linear-gradient(90deg,transparent,${EC[ax.id]})"></div>`;
    } else if(barPct>52){
      fillHtml=`<div class="prm-fill under" style="width:${barPct-50}%"></div>`;
    }
    
    const row=document.createElement('div');
    row.className='prm-row';
    row.innerHTML=`
      <div class="prm-lbl l" style="color:${EC[ax.id]}">${ax.over}</div>
      <div class="prm-track">
        <div class="prm-mid"></div>
        ${fillHtml}
        <div class="prm-dot" style="left:${barPct}%;background:${EC[ax.id]}"></div>
      </div>
      <div class="prm-lbl r">${ax.under}</div>`;
    sec.appendChild(row);
    
    const axLabel=document.createElement('div');
    axLabel.className='prm-axis';
    axLabel.textContent=`${ax.name} · ${ax.element} · ${pct}%`;
    sec.appendChild(axLabel);
    
    // Title
    const titleDiv=document.createElement('div');
    titleDiv.className='prm-title';
    titleDiv.style.color=Math.abs(deviation)>5?(deviation>0?EC[ax.id]:'var(--water)'):'var(--dim)';
    titleDiv.textContent=`"${ax.titles[lv]}"`;
    sec.appendChild(titleDiv);
    
    // Sub-traits
    const absD=Math.abs(deviation);
    const subsDiv=document.createElement('div');
    subsDiv.className='prm-subs';
    if(absD>5){
      const isOverLean=deviation>0;
      const subs=isOverLean?ax.overSubs:ax.underSubs;
      const cls=isOverLean?'over-sub':'under-sub';
      const intensity=Math.min(absD/25,1);
      subs.forEach((s,si)=>{
        const sp=document.createElement('span');
        sp.className=`prm-sub ${cls}`;
        if(isOverLean) sp.style.color=EC[ax.id];
        const subOp=Math.max(0,Math.min(1,intensity-(si*0.15)));
        sp.style.opacity=subOp.toFixed(2);
        sp.textContent=s;
        if(subOp>0.05) subsDiv.appendChild(sp);
      });
    }
    sec.appendChild(subsDiv);
  });
}

function getSipsung(dayEl, targetEl){
  if(!dayEl||!targetEl) return null;
  if(targetEl===dayEl) return 'bigup';
  if(GEN[dayEl]===targetEl) return 'express';
  if(OVR[dayEl]===targetEl) return 'percept';
  if(CTRL[dayEl]===targetEl) return 'discip';
  if(FEED[dayEl]===targetEl) return 'reflect';
  return null;
}

function calcParams(d){
  const dayEl=d.p[1].g.e;
  if(!dayEl) return null;
  const counts={bigup:0,express:0,percept:0,discip:0,reflect:0};
  let total=0;
  // check all 8 slots, skip 일간 itself (p[1].g)
  d.p.forEach((pil,i)=>{
    // 천간
    if(!(i===1)){ // skip 일간
      if(!pil.g.lk && pil.g.e){
        const s=getSipsung(dayEl,pil.g.e);
        if(s){counts[s]++;total++;}
      }
    }
    // 지지 (all pillars including 일지)
    if(!pil.j.lk && pil.j.e){
      const s=getSipsung(dayEl,pil.j.e);
      if(s){counts[s]++;total++;}
    }
  });
  return {counts,total,dayEl};
}

function calcSinsal(d){
  const tags={};// {name: level}
  function add(name){tags[name]=(tags[name]||0)+1;}
  
  // helpers
  const gTids=d.p.map(p=>p.g.tid||null); // [년간,일간,월간,시간] — but order is [시,일,월,년]
  const jTids=d.p.map(p=>p.j.tid||null);
  const dayG=gTids[1]; // 일간
  const dayJ=jTids[1]; // 일지
  const yearJ=jTids[3]; // 년지
  const monthJ=jTids[2]; // 월지
  const allJ=jTids.filter(Boolean); // 모든 지지
  const dayPillar=dayG+dayJ;
  
  if(!dayG||!dayJ) return tags;
  
  // --- A. 일간 기준 단순 룩업 ---
  allJ.forEach(j=>{
    if(CHEONUL[dayG]&&CHEONUL[dayG].includes(j)) add('위기의 은인');
    if(MUNCHANG[dayG]===j) add('책벌레');
    if(YANGIN[dayG]===j) add('살벌한 승부사');
    if(BIIN[dayG]===j) add('날카로움');
    if(HONGYEOM[dayG]===j) add('치명적 매력');
    if(AMROK[dayG]===j) add('숨은 행운아');
    if(GEUMYEO[dayG]===j) add('귀한 인연');
    if(GEONROK[dayG]===j) add('자수성가');
    if(BOKSUNG[dayG]&&BOKSUNG[dayG].includes(j)) add('타고난 식복');
    if(CHEONBOK[dayG]&&CHEONBOK[dayG].includes(j)) add('럭키가이');
  });
  
  // 현침살 (천간 형태)
  if(HYEONCHIM.includes(dayG)) add('날카로움');
  
  // --- B. 일주 조합 ---
  if(GOEGANG.includes(dayPillar)) add('천재 괴짜');
  if(BAEKHO.includes(dayPillar)) add('외과의 손');
  if(YUKSU.includes(dayPillar)) add('빛나는 외모');
  if(GORAN.includes(dayPillar)) add('쉬운 이혼');
  
  // --- C. 12신살 (삼합 기반) ---
  const refJs=[dayJ,yearJ].filter(Boolean);
  refJs.forEach(refJ=>{
    const samhap=SAMHAP[refJ];
    if(!samhap||!SS12T[samhap]) return;
    const row=SS12T[samhap];
    allJ.forEach(j=>{
      const idx=row.indexOf(j);
      if(idx>=0&&j!==refJ) add(SS12N[idx]);
    });
  });
  
  // --- D. 월지 기반 ---
  if(monthJ){
    // 천의성: 월지 바로 앞 지지
    const mIdx=JI_ORDER.indexOf(monthJ);
    if(mIdx>=0){
      const medJ=JI_ORDER[(mIdx-1+12)%12];
      let hasMed=false;
      allJ.forEach((j,i)=>{if(i!==2&&j===medJ) hasMed=true;});// 월지 자신 제외
      if(hasMed){
        add('천생 의사');
        // 천문성 서브태그: 戌-亥 조합
        if((monthJ==='亥'&&medJ==='戌')||(monthJ==='子'&&medJ==='亥')) add('예언자');
      }
    }
  }
  
  // --- E. 복합 조건 ---
  // 원진살
  WONJIN.forEach(pair=>{
    if(allJ.includes(pair[0])&&allJ.includes(pair[1])) add('질긴 악연');
  });
  
  // 귀문관살 (인접 기둥: 월-일 또는 일-시)
  const adjPairs=[[monthJ,dayJ],[dayJ,jTids[0]]];// [월지-일지, 일지-시지]
  adjPairs.forEach(([a,b])=>{
    if(!a||!b) return;
    GWIMUN.forEach(pair=>{
      if((a===pair[0]&&b===pair[1])||(a===pair[1]&&b===pair[0])) add('제6감');
    });
  });
  
  // 삼기 (3연속 천간)
  const g3s=[[gTids[3],gTids[2],gTids[1]],[gTids[2],gTids[1],gTids[0]]];// 년월일, 월일시
  Object.entries(SAMGI).forEach(([type,seq])=>{
    g3s.forEach(g3=>{
      if(!g3[0]||!g3[1]||!g3[2]) return;
      const fwd=g3[0]+g3[1]+g3[2];
      const rev=g3[2]+g3[1]+g3[0];
      if(fwd===seq||rev===seq){
        if(type==='천상') add('타고난 리더');
        if(type==='인중') add('타고난 예술가');
        if(type==='지하') add('타고난 흑막');
      }
    });
  });
  
  // --- F. 방합 기반 (성별 구분) ---
  const gdr=d.gender||'m';
  [dayJ,yearJ].filter(Boolean).forEach(refJ=>{
    allJ.forEach(j=>{
      if(j===refJ) return;
      if(gdr==='m'&&GOSIN[refJ]===j) add('천생 홀아비');
      if(gdr==='f'&&GWASUK[refJ]===j) add('천생 과부');
    });
  });
  
  return tags;
}

function calcHParams(sipCounts,total,elPcts){
  const sc=sipCounts,el=elPcts;
  const b=total/5;// balanced
  // Normalize: each returns 0-6 level
  function clamp06(v){return Math.max(0,Math.min(6,Math.round(v)));}
  // 정조관념 = 율기↑ + 金↑ + 인식↓ 
  const chastity=3 + (sc.discip-b)/b*1.2 + (el.metal-20)/20*0.8 + (b-sc.percept)/b*0.7;
  // 도덕성 = 木↑ + 율기↑ + 인식↓
  const morality=3 + (el.wood-20)/20*1.0 + (sc.discip-b)/b*0.8 + (b-sc.percept)/b*0.7;
  // 쾌락내성 = 사유↑ + 율기↑ + 水↓ + 火↓
  const resist=3 + (sc.reflect-b)/b*1.0 + (sc.discip-b)/b*0.8 + (20-el.water)/20*0.5 + (20-el.fire)/20*0.5;
  // 지배성향: 주체↑ + 土↓ = 지배적
  const submit=3 + (sc.bigup-b)/b*1.5 + (20-el.earth)/20*1.0;
  // 가학성향 = 주체↑ + 인식 현실↑ + 사유 즉흥↓ + 金↑ + 火↑
  const sadism=3 + (sc.bigup-b)/b*0.8 + (sc.percept-b)/b*0.6 + (b-sc.reflect)/b*0.5 + (el.metal-20)/20*0.6 + (el.fire-20)/20*0.4;
  return {chastity:clamp06(chastity),morality:clamp06(morality),resist:clamp06(resist),submit:clamp06(submit),sadism:clamp06(sadism)};
}

// Shared row renderer
function renderAxisRow(container,ax,lv,maxLv,deviation,dotColor,compColor){
  const pct=50-deviation*35;
  const cPct=Math.max(5,Math.min(95,pct));
  const overCol=dotColor||'var(--fire)';
  const underCol=compColor||'var(--water)';
  let fillHtml='';
  if(cPct<48) fillHtml=`<div class="prm-fill over" style="width:${50-cPct}%;background:linear-gradient(90deg,transparent,${overCol})"></div>`;
  else if(cPct>52) fillHtml=`<div class="prm-fill under" style="width:${cPct-50}%;background:linear-gradient(90deg,${underCol},transparent)"></div>`;
  
  const titleIdx=Math.max(0,Math.min(ax.titles.length-1,
    maxLv<=6?Math.round(3+deviation*3):Math.round(3+deviation*(deviation>=0?2:3))
  ));
  const isOverDir=deviation>0;
  const titleColor=Math.abs(deviation)>0.1?(isOverDir?overCol:underCol):'var(--dim)';
  
  // Build sub-traits HTML inline
  let subsHtml='';
  if(ax.overSubs){
    const subs=isOverDir?ax.overSubs:ax.underSubs;
    const subCol=isOverDir?overCol:underCol;
    subsHtml=`<div class="prm-subs">${subs.map(s=>`<span class="prm-sub" style="color:${subCol}">${s}</span>`).join('')}</div>`;
  }
  
  const wrap=document.createElement('div');
  wrap.className='prm-row-wrap';
  wrap.innerHTML=`
    <div class="prm-row-bar">
      <div class="prm-row">
        <div class="prm-lbl l" style="color:${overCol}">${ax.over}</div>
        <div class="prm-track"><div class="prm-mid"></div>${fillHtml}
          <div class="prm-dot" style="left:${cPct}%;background:${isOverDir?overCol:Math.abs(deviation)>0.1?underCol:'var(--gold)'}"></div>
        </div>
        <div class="prm-lbl r" style="color:${underCol}">${ax.under}</div>
      </div>
      ${subsHtml}
    </div>
    <div class="prm-row-info">
      <div class="prm-title" style="color:${titleColor}">"${ax.titles[titleIdx]}"</div>
      <div class="prm-axis">${ax.name}${ax.sipsung?' · '+ax.sipsung:''}${ax.element?' · '+ax.element:''}</div>
    </div>`;
  container.appendChild(wrap);
}

  const maxC=Math.max(...cArr,1);

  const cycle=[dayEl];
  for(let i=0;i<4;i++) cycle.push(GEN[cycle[i]]);

  const ovrColor='#c44536';
  
  // weight helper: returns {opacity, width} based on two node counts
  function lineW(cA,cB){
    const avg=(cA+cB)/2;
    const t=Math.min(avg/Math.max(maxC,1),1);
    return {op:0.04+t*0.86, w:0.3+t*4.0};

  }
  
  // Nodes — size & glow scale with count

function dmGenerate(){
  const race=dmState.race||'human';
  const dayEl=dmState.el;
  const prefs=dmState.vals;
  const m=dmState.mode;
  
  // Convert preferences to weights
  function prefToWeight(p){
    if(p>=3) return 6;if(p===2) return 4;if(p===1) return 2.5;
    if(p===0) return 1.4;if(p===-1) return 0.5;if(p===-2) return 0.1;return 0;
  }
  
  // Build element weight map
  const elW={wood:1.4,fire:1.4,earth:1.4,metal:1.4,water:1.4};
  const elOrder=['wood','fire','earth','metal','water'];
  
  if(m==='sipsung'){
    const sipElMap=[dayEl,GEN[dayEl],OVR[dayEl],CTRL[dayEl],FEED[dayEl]];
    prefs.forEach((p,i)=>{elW[sipElMap[i]]=prefToWeight(p);});
  } else if(m==='elem'){
    prefs.forEach((p,i)=>{elW[elOrder[i]]=prefToWeight(p);});
  } else if(m==='h'){
    // H→십성/오행 역추적 (5축: chastity,morality,resist,submit,sadism)
    const sipElMap=[dayEl,GEN[dayEl],OVR[dayEl],CTRL[dayEl],FEED[dayEl]];
    const sipW=[0,0,0,0,0];
    sipW[3]+=prefs[0]*0.4; sipW[2]-=prefs[0]*0.3;// chastity
    sipW[3]+=prefs[1]*0.3; sipW[2]-=prefs[1]*0.3;// morality
    sipW[4]+=prefs[2]*0.4; sipW[3]+=prefs[2]*0.3;// resist
    sipW[0]+=prefs[3]*0.5;// submit(지배↑→주체↑)
    sipW[0]+=prefs[4]*0.3;sipW[2]+=prefs[4]*0.3;sipW[4]-=prefs[4]*0.2;// sadism
    sipW.forEach((sw,i)=>{elW[sipElMap[i]]+=sw;});
    elW.metal+=prefs[0]*0.3;// chastity↑→metal↑
    elW.wood+=prefs[1]*0.3;// morality↑→wood↑
    elW.water-=prefs[2]*0.2;elW.fire-=prefs[2]*0.2;// resist
    elW.earth-=prefs[3]*0.3;// submit(지배↑→earth↓)
    elW.metal+=prefs[4]*0.3;elW.fire+=prefs[4]*0.2;// sadism
  }
  
  // Clamp and normalize to 7 slots
  elOrder.forEach(e=>{elW[e]=Math.max(0,elW[e]);});
  const wSum=elOrder.reduce((s,e)=>s+elW[e],0);
  const targets=elOrder.map(e=>wSum>0?elW[e]/wSum*7:1.4);
  const floors=targets.map(t=>Math.floor(t));
  let remainder=7-floors.reduce((a,b)=>a+b,0);
  const fracs=targets.map((t,i)=>({i,f:t-floors[i]}));
  fracs.sort((a,b)=>b.f-a.f);
  for(let r=0;r<remainder&&r<fracs.length;r++) floors[fracs[r].i]++;
  
  // Build pool
  const pool=[];
  elOrder.forEach((e,i)=>{for(let j=0;j<floors[i];j++) pool.push(e);});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  
  const isYang=Math.random()>.5;
  const dayGan=(isYang?GANS_Y:GANS_N).find(g=>g.e===dayEl);
  const ganSlots=pool.slice(0,3);
  const jiSlots=pool.slice(3,7);
  const allGans=[...GANS_Y,...GANS_N];
  const allJis=[...JIS_Y,...JIS_N];
  const gans=ganSlots.map(e=>{const ms=allGans.filter(g=>g.e===e);return ms[Math.floor(Math.random()*ms.length)];});
  const jis=jiSlots.map(e=>{const ms=allJis.filter(j=>j.e===e);return ms[Math.floor(Math.random()*ms.length)];});
  
  const pils=[{g:gans[2],j:jis[3]},{g:dayGan,j:jis[2]},{g:gans[1],j:jis[1]},{g:gans[0],j:jis[0]}];
  const elc={wood:0,fire:0,earth:0,metal:0,water:0};
  pils.forEach(p=>{elc[p.g.e]+=12.5;elc[p.j.e]+=12.5;});
  
  const gdr=dmState.gender;
  const _mPool={elf:RNAMES_ELF_M,orc:RNAMES_ORC_M,ogre:RNAMES_OGRE_M,dwarf:RNAMES_DWARF_M,darkelf:RNAMES_DELF_M};
  const _fPool={elf:RNAMES_ELF_F,orc:RNAMES_ORC_F,ogre:RNAMES_OGRE_F,dwarf:RNAMES_DWARF_F,darkelf:RNAMES_DELF_F};
  const _sPool={elf:SURNAMES_ELF,orc:SURNAMES_ORC,ogre:SURNAMES_OGRE,dwarf:SURNAMES_DWARF,darkelf:SURNAMES_DELF};
  const _fn=pick(gdr==='m'?(_mPool[race]||RNAMES_M):(_fPool[race]||RNAMES_F));
  const _sn=Math.random()<0.65?pick(_sPool[race]||SURNAMES):'';
  const nm=_sn?_sn+' '+_fn:_fn;const _surname=_sn;const _firstname=_fn;
  const lv=Math.floor(Math.random()*45)+5;
  const rk=['F','E','D','C','B','A','S'][Math.min(Math.floor(lv/7),6)];
  const gIcon=gdr==='m'?'♂':'♀';
  
  const rd={name:nm,surname:_surname,firstname:_firstname,info:`Lv.${lv} · ${dayGan.n}자리 · ${rk}랭크 · ${gIcon} · ${race==='human'?(ETHNO[ELEM_TO_ETHNO[pils[3].g.e]]||{name:'인간'}).name:RACES[race].name}`,badge:'설계됨',gender:gdr,race:race,
    p:pils,el:elc,
    st:{ap:3+Math.floor(Math.random()*8),speed:30+Math.floor(Math.random()*60),hp:120+Math.floor(Math.random()*280),power:20+Math.floor(Math.random()*70),precision:20+Math.floor(Math.random()*70),resist:15+Math.floor(Math.random()*60)}};
  mode='npc';
  document.getElementById('mn').className='tog-b on';
  document.getElementById('mp').className='tog-b';
  closeDesignModal();
  render(rd);
}

  const dG=d.p[1].g.tid;
  const HY={'甲':'午','乙':'午','丙':'寅','丁':'未','戊':'寅','己':'未','庚':'酉','辛':'酉','壬':'子','癸':'子'};

function renderAppearance(d){

  const pr=calcParams(d);
  if(!pr||!d.p[1].g.e){sec.innerHTML='<div style="text-align:center;color:var(--dim);padding:20px;font-size:11px;">원국 데이터가 부족합니다.</div>';return;}
  const{counts,total}=pr;const b=total/5;
  const dayGan=d.p[1].g,isYang=GAN_YY[dayGan.n]!==undefined?GAN_YY[dayGan.n]:true;
  const el=d.el||{},gdr=d.gender||'m';
  const bigup=counts.bigup||0,express=counts.express||0,percept=counts.percept||0,discip=counts.discip||0;
  const domEl=Object.entries(el).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const dominant=domEl.length>0?domEl[0][0]:'earth';
  const arch=getAppearArchetype(d);const ap=arch.data;
  const BODY={earth:['비만/풍채','plump, thick body'],metal:['근육질','muscular, athletic body'],wood:['마름/장신','slim, tall, slender body'],fire:['마름/날카로움','thin, lean body'],water:['보통~통통','average body, soft body']};
  let eyeCorner;
  if(discip>=b*1.6&&dominant==='metal') eyeCorner='도끼눈';
  else if(isYang||express>discip) eyeCorner='올라간 눈꼬리';
  else eyeCorner='내려간 눈꼬리';
  const pupilBig=express>=discip,browThick=bigup>=b*1.2;
  let gTrait='';
  if(gdr==='f'){const s=express+percept+(el.earth||0)/10+(el.water||0)/10;gTrait=s>=12?'매우 큼':s>=8?'큼':s>=4.5?'보통':'작음';}
  else{const s=bigup+express+(isYang?1:0)+(el.water||0)/10;gTrait=s>=10?'매우 큼':s>=7?'큼':s>=4?'보통':'작음';}
  const sinA=_calcSinsalAppear(d);let sinH='';
  if(sinA['빛나는 외모'])sinH+=`<span style="display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;background:rgba(212,168,67,.15);color:var(--gold);margin:2px;">✨ 빛나는 외모 → beautiful, attractive</span>`;
  if(sinA['치명적 매력'])sinH+=`<span style="display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;background:rgba(196,122,158,.15);color:#c47a9e;margin:2px;">💋 치명적 매력 → seductive, alluring</span>`;
  const body=BODY[dominant]||BODY.earth;
  let h=`<div style="text-align:center;padding:8px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;"><span style="font-size:10px;color:var(--dim);">인종</span><div style="font-size:14px;font-weight:700;color:var(--gold);margin-top:2px;">${ap.name}</div></div>`;
  h+=`<div style="font-size:9px;color:var(--dim);margin:8px 0 4px;letter-spacing:1px;">인종/종족 아키타입 (고정)</div>`;
  [{l:'피부색',v:ap.skin},{l:'모발색',v:ap.hairCol},{l:'모발 형태',v:ap.hairType},{l:'눈동자 색',v:ap.eyeCol}].concat(ap.extra?[{l:'특수',v:ap.extra}]:[]).forEach(t=>{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;margin:3px 0;background:var(--card);border:1px solid var(--bdr);border-radius:8px;"><div style="font-size:11px;font-weight:500;">${t.l}</div><div style="font-size:12px;font-weight:700;">${t.v}</div></div>`;});
  h+=`<div style="font-size:9px;color:var(--dim);margin:12px 0 4px;letter-spacing:1px;">원국 파생</div>`;
  [{l:'체형',v:body[0],c:EC[dominant]},{l:'눈꼬리',v:eyeCorner},{l:'눈동자 크기',v:pupilBig?'큰 눈동자':'작은 눈동자'},{l:'눈썹 굵기',v:browThick?'굵은 눈썹':'보통 눈썹'},{l:gdr==='f'?'유방 크기':'성기 크기',v:gTrait}].forEach(t=>{const cs=t.c?' style="color:'+t.c+'"':'';
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;margin:3px 0;background:var(--card);border:1px solid var(--bdr);border-radius:8px;"><div style="font-size:11px;font-weight:500;">${t.l}</div><div style="font-size:12px;font-weight:700;"${cs}>${t.v}</div></div>`;});
  if(sinH)h+=`<div style="margin-top:8px;font-size:9px;color:var(--dim);margin-bottom:4px;">신살 외형 보정</div>${sinH}`;
  sec.innerHTML=h;
  if(hlSel)hlSel.innerHTML=HAIR_LENS.map(hl=>`<button class="hl-btn" data-hl="${hl.id}" onclick="setHairLen('${hl.id}')" style="padding:5px 12px;border-radius:14px;border:1px solid var(--bdr);background:${hl.id===selectedHairLen?'var(--gold)':'transparent'};color:${hl.id===selectedHairLen?'var(--bg)':'var(--dim)'};font-size:11px;cursor:pointer;font-weight:${hl.id===selectedHairLen?'700':'400'};">${hl.label}</button>`).join('');
  renderNAI(d);
}
function renderNAI(d){
  const elo=document.getElementById('nai-prompt');if(!elo||!d.p[1].g.e)return;
  const pr=calcParams(d);if(!pr)return;const{counts,total}=pr;const b=total/5;
  const isYang=GAN_YY[d.p[1].g.n]!==undefined?GAN_YY[d.p[1].g.n]:true,gdr=d.gender||'m',elO=d.el||{};
  const dom=Object.entries(elO).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);const domE=dom.length>0?dom[0][0]:'earth';
  const bigup=counts.bigup||0,express=counts.express||0,percept=counts.percept||0,discip=counts.discip||0;
  const B={earth:'plump, thick body',metal:'muscular, athletic body',wood:'slim, tall, slender body',fire:'thin, lean body',water:'average body, soft body'};
  const arch=getAppearArchetype(d);const ap=arch.data;
  const tags=[gdr==='f'?'1girl':'1boy'];
  tags.push(ap.skinNai);tags.push(ap.hairColNai);tags.push(ap.hairTypeNai);
  const hl=HAIR_LENS.find(h=>h.id===selectedHairLen);if(hl)tags.push(hl.nai);
  tags.push(ap.eyeColNai);if(ap.extra)tags.push(ap.extra);
  tags.push(B[domE]);
  if(discip>=b*1.6&&domE==='metal')tags.push('sharp eyes, narrow eyes');else if(isYang||express>discip)tags.push('upturned eyes');else tags.push('droopy eyes, downturned eyes');
  tags.push(express>=discip?'large eyes':'small eyes');
  if(bigup>=b*1.2)tags.push('thick eyebrows');
  if(gdr==='f'){const s=express+percept+(elO.earth||0)/10+(elO.water||0)/10;tags.push(s>=12?'huge breasts':s>=8?'large breasts':s>=4.5?'medium breasts':'small breasts, flat chest');}
  else{const s=bigup+express+(isYang?1:0)+(elO.water||0)/10;if(s>=10)tags.push('huge penis');else if(s>=7)tags.push('large penis');else if(s<4)tags.push('small penis');}
  const sinA=_calcSinsalAppear(d);if(sinA['빛나는 외모'])tags.push('beautiful, attractive');if(sinA['치명적 매력'])tags.push('seductive, alluring');
  elo.textContent=tags.filter(Boolean).join(', ');
}
